<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeLink - Cameroon Rentals</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
      padding: 20px 0;
      border-radius: 16px;
      margin-bottom: 30px;
    }
    header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
    }
    header h1 span {
      color: #f59e0b;
    }
    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    .btn-primary {
      background: #f59e0b;
      color: #1a1a2e;
    }
    .btn-primary:hover {
      background: #d97706;
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: #3b82f6;
      color: white;
    }
    .btn-secondary:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .btn-success {
      background: #10b981;
      color: white;
    }
    .btn-success:hover {
      background: #059669;
    }
    .btn-warning {
      background: #f59e0b;
      color: #1a1a2e;
    }
    .btn-warning:hover {
      background: #d97706;
    }
    .btn-outline {
      background: transparent;
      color: white;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.1);
    }
    .btn-rented {
      background: #ef4444;
      color: white;
    }
    .btn-rented:hover {
      background: #dc2626;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-card .number {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .stat-card .label {
      color: #6b7280;
      font-size: 14px;
      margin-top: 4px;
    }
    .search-bar {
      display: flex;
      gap: 8px;
      background: white;
      padding: 6px;
      border-radius: 16px;
      align-items: center;
      max-width: 600px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .search-bar input {
      flex: 1;
      padding: 12px 18px;
      min-width: 150px;
      font-size: 15px;
      border: none;
      outline: none;
      border-radius: 10px;
    }
    .search-bar button {
      padding: 12px 22px;
      white-space: nowrap;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      background: #f59e0b;
      color: #1a1a2e;
      font-weight: 600;
      cursor: pointer;
    }
    .search-bar button:hover {
      background: #d97706;
    }
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }
    .listing-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      padding: 20px;
      position: relative;
    }
    .listing-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .listing-card .title {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .listing-card .location {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .listing-card .description {
      color: #4b5563;
      font-size: 14px;
      margin: 8px 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
    }
    .listing-card .description strong {
      color: #1a1a2e;
    }
    .listing-card .description em {
      color: #6b7280;
    }
    .listing-card .description ul {
      padding-left: 20px;
      margin: 4px 0;
    }
    .listing-card .description li {
      list-style: disc;
    }
    .listing-card .price {
      font-size: 22px;
      font-weight: 700;
      color: #f59e0b;
      margin: 8px 0;
    }
    .listing-card .type {
      display: inline-block;
      background: #e5e7eb;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: #374151;
    }
    .listing-card .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
    }
    .status-available {
      background: #10b981;
      color: white;
    }
    .status-rented {
      background: #ef4444;
      color: white;
    }
    .listing-card .whatsapp {
      display: inline-block;
      background: #25D366;
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      text-decoration: none;
      margin-top: 10px;
    }
    .listing-card .whatsapp:hover {
      background: #1ebe5d;
    }
    .listing-card .video-link {
      display: inline-block;
      color: #3b82f6;
      text-decoration: none;
      font-size: 14px;
      margin-top: 8px;
    }
    .listing-card .video-link:hover {
      text-decoration: underline;
    }
    /* Badges Styles */
    .badges-container {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 8px 0;
    }
    .badge {
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      display: inline-block;
    }
    .badge-verified {
      background: #10b981;
      color: white;
    }
    .badge-agent {
      background: #3b82f6;
      color: white;
    }
    .badge-owner {
      background: #f59e0b;
      color: white;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 14px;
      color: #374151;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.3s;
      font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: #f59e0b;
      outline: none;
    }
    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 30px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 24px;
      cursor: pointer;
      color: #6b7280;
      background: none;
      border: none;
    }
    .modal-close:hover {
      color: #1a1a2e;
    }
    .modal-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a1a2e;
    }
    .admin-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .admin-actions .btn {
      font-size: 12px;
      padding: 6px 14px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    .footer {
      text-align: center;
      padding: 30px 0;
      color: #6b7280;
      font-size: 14px;
      margin-top: 40px;
      border-top: 1px solid #e5e7eb;
    }
    /* Formatting help text */
    .formatting-hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }
    .formatting-hint code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
    @media (max-width: 640px) {
      header .container {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }
      .header-actions {
        justify-content: center;
      }
      .search-bar {
        flex-direction: column;
      }
      .search-bar input {
        width: 100%;
      }
      .listings-grid {
        grid-template-columns: 1fr;
      }
      .modal-content {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>🏠 Home<span>Link</span></h1>
      <div class="header-actions">
        <button id="add-listing-btn" class="btn btn-primary" onclick="showAddListing()" style="display:none;">+ Add Listing</button>
        <button class="btn btn-outline" onclick="toggleAdmin()">🔑 Admin</button>
        <span id="admin-status" style="font-size:12px;color:#9ca3af;"></span>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- Stats -->
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="number" id="stat-total">0</div>
        <div class="label">Total Listings</div>
      </div>
      <div class="stat-card">
        <div class="number" id="stat-views">0</div>
        <div class="label">Total Views</div>
      </div>
      <div class="stat-card">
        <div class="number" id="stat-locations">0</div>
        <div class="label">Locations</div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by location, title..." onkeyup="if(event.key==='Enter') searchListings()">
      <button onclick="searchListings()">🔍 Search</button>
      <button onclick="clearSearch()" style="background:#e5e7eb;color:#374151;">✕</button>
    </div>

    <!-- Listings -->
    <div id="listings-container">
      <div class="listings-grid" id="listings-grid"></div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal" id="listing-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2 class="modal-title" id="modal-title">Add New Listing</h2>
      <form id="listing-form" onsubmit="event.preventDefault(); saveListing();">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="form-title" required placeholder="e.g., Beautiful 2-bedroom apartment">
        </div>
        <div class="form-group">
          <label>Description *</label>
          <textarea id="form-description" required placeholder="Describe the property..."></textarea>
          <div class="formatting-hint">
            💡 You can use: <code>**bold**</code>, <code>*italic*</code>, and bullet lists with <code>- item</code>
          </div>
        </div>
        <div class="form-group">
          <label>Location *</label>
          <input type="text" id="form-location" required placeholder="e.g., Molyko, Buea">
        </div>
        <div class="form-group">
          <label>Price (FCFA/month) *</label>
          <input type="number" id="form-price" required placeholder="e.g., 150000">
        </div>
        <div class="form-group">
          <label>Property Type</label>
          <input type="text" id="form-houseType" placeholder="e.g., Apartment, Studio, RKT">
        </div>
        <div class="form-group">
          <label>WhatsApp Number *</label>
          <input type="text" id="form-whatsapp" required placeholder="e.g., 690123456">
        </div>
        <div class="form-group">
          <label>TikTok / Video URL</label>
          <input type="url" id="form-video" placeholder="https://www.tiktok.com/@...">
        </div>

        <!-- ===== BADGES SECTION ===== -->
        <div class="form-group">
          <label>Badges (Select all that apply)</label>
          <div style="display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px;">
            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
              <input type="checkbox" id="badge-verified" value="verified" onchange="updateBadges()">
              <span class="badge badge-verified">✅ Verified by HomeVN</span>
            </label>
            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
              <input type="checkbox" id="badge-agent" value="agent" onchange="updateBadges()">
              <span class="badge badge-agent">🏢 Agent Listed</span>
            </label>
            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
              <input type="checkbox" id="badge-owner" value="owner" onchange="updateBadges()">
              <span class="badge badge-owner">👤 Owner Listed</span>
            </label>
          </div>
          <input type="hidden" id="form-badges" value="">
        </div>
        <!-- ===== END BADGES SECTION ===== -->

        <input type="hidden" id="form-id" value="">
        <input type="hidden" id="form-isAvailable" value="true">
        <div style="display:flex; gap:12px; margin-top:20px;">
          <button type="submit" class="btn btn-primary" style="flex:1;">💾 Save Listing</button>
          <button type="button" class="btn btn-danger" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="footer">
    <p>🏠 HomeLink &bull; Find your perfect home in Cameroon</p>
  </div>

  <script>
    // ============================================
    // STATE
    // ============================================
    let listings = [];
    let isAdmin = false;
    let editingId = null;
    const API_URL = 'https://homelink-production.up.railway.app/api';

    // ============================================
    // TEXT FORMATTING FUNCTION
    // ============================================
    function formatDescription(text) {
      if (!text) return '';
      let html = text;
      // Bold: **text** -> <strong>text</strong>
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      // Italic: *text* -> <em>text</em>
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
      // Bullet lists: - item -> <li>item</li>
      html = html.replace(/^-\s+(.*?)$/gm, '<li>$1</li>');
      // Wrap consecutive <li> items in a <ul>
      html = html.replace(/((?:<li>.*?<\/li>\s*)+)/g, '<ul>$1</ul>');
      // Line breaks
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    // ============================================
    // BADGES FUNCTIONS
    // ============================================
    function updateBadges() {
      const checkboxes = document.querySelectorAll('#badge-verified, #badge-agent, #badge-owner');
      const selected = [];
      checkboxes.forEach(cb => {
        if (cb.checked) selected.push(cb.value);
      });
      document.getElementById('form-badges').value = selected.join(',');
    }

    function loadBadgesIntoForm(badgesArray) {
      const badges = badgesArray || [];
      document.querySelectorAll('#badge-verified, #badge-agent, #badge-owner').forEach(cb => {
        cb.checked = badges.includes(cb.value);
      });
      document.getElementById('form-badges').value = badges.join(',');
    }

    function getBadgesFromForm() {
      const val = document.getElementById('form-badges').value;
      return val ? val.split(',') : [];
    }

    // ============================================
    // RENDER LISTINGS
    // ============================================
    function renderListings(data) {
      const grid = document.getElementById('listings-grid');
      const items = data || listings;

      if (!items || items.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <h3>🏠 No listings found</h3>
            <p>Be the first to add a property!</p>
            ${isAdmin ? `<button class="btn btn-primary" onclick="showAddListing()" style="margin-top:16px;">+ Add Listing</button>` : ''}
          </div>
        `;
        return;
      }

      grid.innerHTML = items.map(listing => {
        // Build badges HTML
        const badges = listing.badges || [];
        let badgesHtml = '';
        if (badges.length > 0) {
          badgesHtml = `<div class="badges-container">
            ${badges.includes('verified') ? '<span class="badge badge-verified">✅ Verified by HomeVN</span>' : ''}
            ${badges.includes('agent') ? '<span class="badge badge-agent">🏢 Agent Listed</span>' : ''}
            ${badges.includes('owner') ? '<span class="badge badge-owner">👤 Owner Listed</span>' : ''}
          </div>`;
        }

        // Status badge
        const isAvailable = listing.isAvailable !== false;
        const statusHtml = `<span class="status-badge ${isAvailable ? 'status-available' : 'status-rented'}">${isAvailable ? '✅ Available' : '🔴 Rented'}</span>`;

        // Formatted description
        const formattedDesc = formatDescription(listing.description || '');

        return `
          <div class="listing-card">
            <div class="title">${listing.title || 'Untitled'}</div>
            <div class="location">📍 ${listing.location || 'Unknown location'}</div>
            ${badgesHtml}
            <div class="description">${formattedDesc}</div>
            <div class="price">${(listing.price || 0).toLocaleString()} FCFA/month</div>
            <div>
              <span class="type">${listing.houseType || 'N/A'}</span>
              ${statusHtml}
              <span style="font-size:12px;color:#6b7280;margin-left:8px;">👁️ ${listing.views || 0}</span>
            </div>
            ${listing.whatsappNumber ? `<a href="https://wa.me/237${listing.whatsappNumber}" target="_blank" class="whatsapp">💬 Contact on WhatsApp</a>` : ''}
            ${listing.videoUrl ? `<br><a href="${listing.videoUrl}" target="_blank" class="video-link">▶️ Watch Video</a>` : ''}
            ${isAdmin ? `
              <div class="admin-actions">
                <button class="btn btn-secondary" onclick="editListing('${listing._id}')">✏️ Edit</button>
                <button class="btn ${isAvailable ? 'btn-warning' : 'btn-success'}" onclick="toggleRented('${listing._id}')">${isAvailable ? '📋 Mark Rented' : '🏠 Mark Available'}</button>
                <button class="btn btn-danger" onclick="deleteListing('${listing._id}')">🗑️ Delete</button>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    // ============================================
    // API CALLS
    // ============================================
    async function fetchListings() {
      try {
        const res = await fetch(`${API_URL}/listings`);
        const data = await res.json();
        if (data.success) {
          listings = data.data || [];
          updateStats();
          renderListings();
        }
      } catch (e) {
        console.error('Error fetching listings:', e);
      }
    }

    async function fetchStats() {
      try {
        const res = await fetch(`${API_URL}/stats`);
        const data = await res.json();
        if (data.success) {
          document.getElementById('stat-total').textContent = data.data.total || 0;
          document.getElementById('stat-views').textContent = data.data.views || 0;
          document.getElementById('stat-locations').textContent = data.data.locations || 0;
        }
      } catch (e) {
        console.error('Error fetching stats:', e);
      }
    }

    function updateStats() {
      const total = listings.length;
      const views = listings.reduce((sum, l) => sum + (l.views || 0), 0);
      const locations = new Set(listings.map(l => l.location)).size;
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-views').textContent = views;
      document.getElementById('stat-locations').textContent = locations;
    }

    // ============================================
    // SEARCH
    // ============================================
    function searchListings() {
      const query = document.getElementById('search-input').value.trim();
      if (!query) {
        renderListings(listings);
        return;
      }
      const filtered = listings.filter(l =>
        (l.title || '').toLowerCase().includes(query.toLowerCase()) ||
        (l.location || '').toLowerCase().includes(query.toLowerCase()) ||
        (l.description || '').toLowerCase().includes(query.toLowerCase())
      );
      renderListings(filtered);
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      renderListings(listings);
    }

    // ============================================
    // CRUD OPERATIONS
    // ============================================
    async function saveListing() {
      const data = {
        title: document.getElementById('form-title').value.trim(),
        description: document.getElementById('form-description').value.trim(),
        location: document.getElementById('form-location').value.trim(),
        price: parseFloat(document.getElementById('form-price').value) || 0,
        houseType: document.getElementById('form-houseType').value.trim(),
        whatsappNumber: document.getElementById('form-whatsapp').value.trim(),
        videoUrl: document.getElementById('form-video').value.trim(),
        badges: getBadgesFromForm(),
        isAvailable: document.getElementById('form-isAvailable').value === 'true'
      };

      if (!data.title || !data.description || !data.location || !data.price || !data.whatsappNumber) {
        alert('Please fill in all required fields (*)');
        return;
      }

      const id = document.getElementById('form-id').value;
      const url = id ? `${API_URL}/listings/${id}` : `${API_URL}/listings`;
      const method = id ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
          alert(id ? '✅ Listing updated!' : '✅ Listing added!');
          closeModal();
          fetchListings();
        } else {
          alert('❌ Error: ' + (result.message || 'Unknown error'));
        }
      } catch (e) {
        alert('❌ Error: ' + e.message);
      }
    }

    async function deleteListing(id) {
      if (!confirm('Are you sure you want to delete this listing?')) return;
      try {
        const res = await fetch(`${API_URL}/listings/${id}`, { method: 'DELETE' });
        const result = await res.json();
        if (result.success) {
          alert('✅ Listing deleted');
          fetchListings();
        } else {
          alert('❌ Error deleting');
        }
      } catch (e) {
        alert('❌ Error: ' + e.message);
      }
    }

    async function editListing(id) {
      const listing = listings.find(l => l._id === id);
      if (!listing) return;
      editingId = id;
      document.getElementById('modal-title').textContent = 'Edit Listing';
      document.getElementById('form-id').value = id;
      document.getElementById('form-title').value = listing.title || '';
      document.getElementById('form-description').value = listing.description || '';
      document.getElementById('form-location').value = listing.location || '';
      document.getElementById('form-price').value = listing.price || '';
      document.getElementById('form-houseType').value = listing.houseType || '';
      document.getElementById('form-whatsapp').value = listing.whatsappNumber || '';
      document.getElementById('form-video').value = listing.videoUrl || '';
      document.getElementById('form-isAvailable').value = listing.isAvailable !== false ? 'true' : 'false';
      loadBadgesIntoForm(listing.badges || []);
      document.getElementById('listing-modal').classList.add('show');
    }

    // ============================================
    // TOGGLE RENTED STATUS
    // ============================================
    async function toggleRented(id) {
      if (!isAdmin) {
        alert('Please login as admin first');
        return;
      }
      const listing = listings.find(l => l._id === id);
      if (!listing) return;
      const isCurrentlyAvailable = listing.isAvailable !== false;
      const newStatus = !isCurrentlyAvailable;
      const statusText = newStatus ? 'available' : 'rented';
      if (!confirm(`Mark this property as ${statusText}?`)) return;

      try {
        const res = await fetch(`${API_URL}/listings/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ isAvailable: newStatus })
        });
        const result = await res.json();
        if (result.success) {
          alert(`✅ Property marked as ${statusText}!`);
          fetchListings();
        } else {
          alert('❌ Error updating status');
        }
      } catch (e) {
        alert('❌ Error: ' + e.message);
      }
    }

    // ============================================
    // MODAL CONTROLS
    // ============================================
    function showAddListing() {
      if (!isAdmin) {
        alert('Please login as admin first (click the Admin button)');
        return;
      }
      editingId = null;
      document.getElementById('modal-title').textContent = 'Add New Listing';
      document.getElementById('form-id').value = '';
      document.getElementById('form-title').value = '';
      document.getElementById('form-description').value = '';
      document.getElementById('form-location').value = '';
      document.getElementById('form-price').value = '';
      document.getElementById('form-houseType').value = '';
      document.getElementById('form-whatsapp').value = '';
      document.getElementById('form-video').value = '';
      document.getElementById('form-isAvailable').value = 'true';
      loadBadgesIntoForm([]);
      document.getElementById('listing-modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('listing-modal').classList.remove('show');
    }

    // ============================================
    // ADMIN
    // ============================================
    function toggleAdmin() {
      const addBtn = document.getElementById('add-listing-btn');
      if (isAdmin) {
        isAdmin = false;
        document.getElementById('admin-status').textContent = '';
        addBtn.style.display = 'none';
        renderListings();
        return;
      }
      const password = prompt('Enter admin password:');
      if (password === 'elage123@123') {
        isAdmin = true;
        document.getElementById('admin-status').textContent = '✅ Admin mode';
        addBtn.style.display = 'block';
        renderListings();
      } else if (password !== null) {
        alert('❌ Wrong password');
      }
    }

    // ============================================
    // INIT
    // ============================================
    fetchListings();

    // Close modal on outside click
    document.getElementById('listing-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
