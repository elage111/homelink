<!DOCTYPE html>
<html>
<head>
    <title>HomeLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="app"></div>
    <script>
        const API_URL = 'https://homelink-production.up.railway.app/api';
        
        // Simple form with badges - THIS WORKS!
        document.getElementById('app').innerHTML = `
            <div style="max-width:600px;margin:40px auto;padding:20px;background:white;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1);">
                <h1 style="font-size:24px;font-weight:700;margin-bottom:20px;">Add Listing with Badges</h1>
                <form id="listing-form">
                    <input type="text" id="title" placeholder="Title" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">
                    <textarea id="description" placeholder="Description" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;"></textarea>
                    <input type="number" id="price" placeholder="Price" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">
                    <input type="text" id="location" placeholder="Location" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">
                    <input type="text" id="whatsapp" placeholder="WhatsApp" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">
                    
                    <!-- BADGES - SIMPLE CHECKBOXES -->
                    <div style="margin:10px 0;">
                        <label><input type="checkbox" value="verified" class="badge-cb"> ✅ Verified</label><br>
                        <label><input type="checkbox" value="owner" class="badge-cb"> 🏠 Owner</label><br>
                        <label><input type="checkbox" value="agent" class="badge-cb"> 👔 Agent</label>
                    </div>
                    
                    <button type="submit" style="background:#FF385C;color:white;padding:12px 24px;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Publish</button>
                </form>
                <div id="result" style="margin-top:20px;"></div>
            </div>
        `;
        
        // Submit function - THIS WORKS!
        document.getElementById('listing-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Get badges
            const checkboxes = document.querySelectorAll('.badge-cb:checked');
            const badges = Array.from(checkboxes).map(cb => cb.value);
            
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                price: parseFloat(document.getElementById('price').value),
                location: document.getElementById('location').value,
                houseType: 'Apartment',
                whatsappNumber: document.getElementById('whatsapp').value,
                videoUrl: 'https://example.com/video.mp4',
                images: ['https://example.com/image.jpg'],
                isAvailable: true,
                featured: false,
                badges: badges
            };
            
            console.log('Sending:', data);
            
            try {
                const res = await fetch(API_URL + '/listings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                document.getElementById('result').innerHTML = 
                    `<div style="color:green;">✅ Listing created! Badges: ${badges.join(', ') || 'none'}</div>
                     <pre style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:12px;">${JSON.stringify(result, null, 2)}</pre>`;
            } catch(err) {
                document.getElementById('result').innerHTML = `<div style="color:red;">❌ Error: ${err.message}</div>`;
            }
        });
    </script>
</body>
</html>
