<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HomeLink - Cameroon Rentals</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f6fa;
            color: #1a1a2e;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ─── HEADER ─── */
        header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 20px 30px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 28px;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
        }
        header h1:hover {
            transform: scale(1.02);
        }
        header h1 span {
            color: #fbbf24;
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        #admin-status {
            font-size: 13px;
            color: #9ca3af;
        }

        /* ─── BUTTONS ─── */
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s ease;
        }
        .btn-primary {
            background: #fbbf24;
            color: #1a1a2e;
        }
        .btn-primary:hover {
            background: #f59e0b;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.25);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-secondary {
            background: #3b82f6;
            color: white;
        }
        .btn-secondary:hover {
            background: #2563eb;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-success:hover {
            background: #059669;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        /* ─── STATS ─── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: white;
            padding: 18px 20px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .stat-card .number {
            font-size: 30px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .stat-card .label {
            font-size: 13px;
            color: #6b7280;
            margin-top: 2px;
        }

        /* ─── SEARCH ─── */
        .search-bar {
            display: flex;
            gap: 8px;
            background: white;
            padding: 6px;
            border-radius: 14px;
            max-width: 560px;
            margin-bottom: 28px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .search-bar input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            outline: none;
            border-radius: 10px;
            font-size: 15px;
        }
        .search-bar button {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            background: #fbbf24;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-bar button:hover {
            background: #f59e0b;
        }

        /* ─── LISTINGS GRID ─── */
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .listing-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: 0.25s ease;
        }
        .listing-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        .listing-card .title {
            font-size: 18px;
            font-weight: 600;
        }
        .listing-card .location {
            color: #6b7280;
            font-size: 14px;
            margin: 4px 0 8px;
        }
        .listing-card .description {
            color: #4b5563;
            font-size: 14px;
            margin: 6px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
        }
        .listing-card .description.expanded {
            max-height: none;
        }
        .listing-card .description.collapsed {
            max-height: 80px;
            overflow: hidden;
            position: relative;
        }
        .listing-card .description.collapsed::after {
            content: "...";
            position: absolute;
            bottom: 0;
            right: 0;
            background: white;
            padding-left: 4px;
        }
        .listing-card .expand-btn {
            background: none;
            border: none;
            color: #3b82f6;
            cursor: pointer;
            font-size: 13px;
            padding: 4px 0;
            font-weight: 600;
        }
        .listing-card .expand-btn:hover {
            text-decoration: underline;
        }
        .listing-card .price {
            font-size: 22px;
            font-weight: 700;
            color: #f59e0b;
            margin: 8px 0;
        }
        .listing-card .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            font-size: 13px;
        }
        .listing-card .meta .type {
            background: #e5e7eb;
            padding: 2px 12px;
            border-radius: 20px;
        }
        .listing-card .meta .status {
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        .status-available {
            background: #d1fae5;
            color: #065f46;
        }
        .status-rented {
            background: #fee2e2;
            color: #991b1b;
        }
        .listing-card .whatsapp-btn {
            display: inline-block;
            background: #25d366;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
            text-decoration: none;
        }
        .listing-card .whatsapp-btn:hover {
            background: #1ebe5d;
        }
        .listing-card .video-link {
            display: inline-block;
            color: #3b82f6;
            font-size: 14px;
            margin-top: 6px;
            text-decoration: none;
        }
        .listing-card .video-link:hover {
            text-decoration: underline;
        }
        .listing-card .admin-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        /* ─── BADGES ─── */
        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .badge {
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-verified {
            background: #10b981;
            color: white;
        }
        .badge-agent {
            background: #3b82f6;
            color: white;
        }
        .badge-owner {
            background: #f59e0b;
            color: white;
        }

        /* ─── MODAL ─── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 560px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 14px;
            right: 20px;
            font-size: 26px;
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
        }
        .modal-close:hover {
            color: #1a1a2e;
        }
        .modal-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            color: #374151;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #f59e0b;
            outline: none;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .form-row .form-group {
            flex: 1;
            min-width: 140px;
        }

        /* ─── EMPTY / FOOTER ─── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        .empty-state h3 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .footer {
            text-align: center;
            padding: 30px 0 10px;
            color: #9ca3af;
            font-size: 14px;
            border-top: 1px solid #e5e7eb;
            margin-top: 40px;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {
            header {
                flex-direction: column;
                text-align: center;
            }
            .header-actions {
                justify-content: center;
            }
            .search-bar {
                flex-direction: column;
            }
            .listings-grid {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ═══ HEADER ═══ -->
        <header>
            <h1 id="logo">🏠 Home<span>Link</span></h1>
            <div class="header-actions">
                <button id="addBtn" class="btn btn-primary" style="display:none;" onclick="openAddModal()">
                    ＋ Add Listing
                </button>
                <span id="adminStatus"></span>
            </div>
        </header>

        <!-- ═══ STATS ═══ -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="number" id="statTotal">0</div>
                <div class="label">Total Listings</div>
            </div>
            <div class="stat-card">
                <div class="number" id="statViews">0</div>
                <div class="label">Total Views</div>
            </div>
            <div class="stat-card">
                <div class="number" id="statLocations">0</div>
                <div class="label">Locations</div>
            </div>
        </div>

        <!-- ═══ SEARCH ═══ -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by title or location…" onkeyup="if(event.key==='Enter') searchListings()" />
            <button onclick="searchListings()">🔍 Search</button>
            <button onclick="clearSearch()" style="background:#e5e7eb;color:#374151;">✕</button>
        </div>

        <!-- ═══ LISTINGS ═══ -->
        <div id="listingsContainer">
            <div class="listings-grid" id="listingsGrid"></div>
        </div>

        <!-- ═══ FOOTER ═══ -->
        <div class="footer">🏠 HomeLink &bull; Find your perfect home in Cameroon</div>
    </div>

    <!-- ═══ MODAL ═══ -->
    <div class="modal" id="listingModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-title" id="modalTitle">Add New Listing</div>
            <form id="listingForm" onsubmit="event.preventDefault(); saveListing();">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="fTitle" required placeholder="e.g. Beautiful 2-bedroom apartment" />
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="fDesc" required placeholder="Describe the property…"></textarea>
                </div>
                <div class="form-group">
                    <label>Location *</label>
                    <input type="text" id="fLocation" required placeholder="e.g. Molyko, Buea" />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Price (FCFA) *</label>
                        <input type="number" id="fPrice" required placeholder="150000" />
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <input type="text" id="fType" placeholder="Apartment, Studio, RKT…" />
                    </div>
                </div>
                <div class="form-group">
                    <label>WhatsApp Number *</label>
                    <input type="text" id="fWhatsapp" required placeholder="690123456" />
                </div>
                <div class="form-group">
                    <label>Video / TikTok URL</label>
                    <input type="url" id="fVideo" placeholder="https://www.tiktok.com/…" />
                </div>

                <!-- Badges -->
                <div class="form-group">
                    <label>Badges</label>
                    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:6px;">
                        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                            <input type="checkbox" id="badgeV" value="verified" onchange="updateBadges()" />
                            <span class="badge badge-verified">✅ Verified by HomeVN</span>
                        </label>
                        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                            <input type="checkbox" id="badgeA" value="agent" onchange="updateBadges()" />
                            <span class="badge badge-agent">🏢 Agent Listed</span>
                        </label>
                        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                            <input type="checkbox" id="badgeO" value="owner" onchange="updateBadges()" />
                            <span class="badge badge-owner">👤 Owner Listed</span>
                        </label>
                    </div>
                    <input type="hidden" id="fBadges" />
                </div>

                <input type="hidden" id="fId" />
                <div style="display:flex;gap:12px;margin-top:20px;">
                    <button type="submit" class="btn btn-primary" style="flex:1;">💾 Save</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════
        //  STATE
        // ═══════════════════════════════════════════
        let listings = [];
        let isAdmin = false;
        let expandedDescriptions = {};
        const API = 'https://homelink-production.up.railway.app/api';

        // ═══════════════════════════════════════════
        //  10-TAP ADMIN LOGIN
        // ═══════════════════════════════════════════
        let tapCount = 0;
        let tapTimer = null;

        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.getElementById('logo');
            logo.title = '🔑 Tap 10 times to unlock admin';
            logo.addEventListener('click', () => {
                tapCount++;
                clearTimeout(tapTimer);
                if (tapCount >= 5 && tapCount < 10) {
                    logo.style.color = '#fbbf24';
                }
                tapTimer = setTimeout(() => {
                    tapCount = 0;
                    logo.style.color = '';
                }, 3000);
                if (tapCount >= 10) {
                    tapCount = 0;
                    logo.style.color = '';
                    toggleAdmin();
                }
            });
            fetchListings();
        });

        // ═══════════════════════════════════════════
        //  ADMIN TOGGLE
        // ═══════════════════════════════════════════
        function toggleAdmin() {
            isAdmin = !isAdmin;
            const addBtn = document.getElementById('addBtn');
            const status = document.getElementById('adminStatus');
            if (isAdmin) {
                addBtn.style.display = 'block';
                status.textContent = '✅ Admin mode';
                renderListings();
            } else {
                addBtn.style.display = 'none';
                status.textContent = '';
                renderListings();
            }
        }

        // ═══════════════════════════════════════════
        //  FETCH LISTINGS
        // ═══════════════════════════════════════════
        async function fetchListings() {
            try {
                const res = await fetch(`${API}/listings`);
                const data = await res.json();
                if (data.success) {
                    listings = data.data || [];
                    updateStats();
                    renderListings();
                }
            } catch (e) {
                console.error('Fetch error:', e);
            }
        }

        function updateStats() {
            const total = listings.length;
            const views = listings.reduce((s, l) => s + (l.views || 0), 0);
            const locations = new Set(listings.map(l => l.location)).size;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statViews').textContent = views;
            document.getElementById('statLocations').textContent = locations;
        }

        // ═══════════════════════════════════════════
        //  RENDER LISTINGS
        // ═══════════════════════════════════════════
        function renderListings(filtered) {
            const grid = document.getElementById('listingsGrid');
            const items = filtered || listings;
            if (!items.length) {
                grid.innerHTML =
                    `<div class="empty-state" style="grid-column:1/-1;"><h3>🏠 No listings yet</h3><p>Add your first property!</p></div>`;
                return;
            }
            grid.innerHTML = items.map(l => {
                const badges = l.badges || [];
                const available = l.isAvailable !== false;
                const id = l._id;
                const isExpanded = expandedDescriptions[id] || false;
                const desc = l.description || '';
                const needsExpand = desc.length > 150;

                let badgeHtml = '';
                if (badges.length) {
                    badgeHtml = `<div class="badges">
                        ${badges.includes('verified') ? '<span class="badge badge-verified">✅ Verified by HomeVN</span>' : ''}
                        ${badges.includes('agent') ? '<span class="badge badge-agent">🏢 Agent Listed</span>' : ''}
                        ${badges.includes('owner') ? '<span class="badge badge-owner">👤 Owner Listed</span>' : ''}
                    </div>`;
                }

                let descHtml = '';
                if (desc) {
                    const displayDesc = desc.replace(/\n/g, '<br>');
                    descHtml = `
                        <div class="description ${isExpanded ? 'expanded' : 'collapsed'}" id="desc-${id}">
                            ${displayDesc}
                        </div>
                        ${needsExpand ? `<button class="expand-btn" onclick="toggleDescription('${id}')">${isExpanded ? 'Show less' : 'Show more'}</button>` : ''}
                    `;
                }

                let adminHtml = '';
                if (isAdmin) {
                    adminHtml = `
                        <div class="admin-actions">
                            <button class="btn btn-secondary btn-sm" onclick="editListing('${id}')">✏️ Edit</button>
                            <button class="btn ${available ? 'btn-danger' : 'btn-success'} btn-sm" onclick="toggleRented('${id}')">
                                ${available ? '🔴 Mark Rented' : '🏠 Mark Available'}
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="deleteListing('${id}')">🗑️ Delete</button>
                        </div>
                    `;
                }

                return `
                    <div class="listing-card">
                        <div class="title">${l.title || 'Untitled'}</div>
                        <div class="location">📍 ${l.location || 'Unknown'}</div>
                        ${descHtml}
                        ${badgeHtml}
                        <div class="price">${(l.price || 0).toLocaleString()} FCFA/month</div>
                        <div class="meta">
                            <span class="type">${l.houseType || 'N/A'}</span>
                            <span class="status ${available ? 'status-available' : 'status-rented'}">
                                ${available ? '✅ Available' : '🔴 Rented'}
                            </span>
                            <span>👁️ ${l.views || 0}</span>
                        </div>
                        ${l.whatsappNumber ? `<a href="https://wa.me/237${l.whatsappNumber}" target="_blank" class="whatsapp-btn">💬 Contact on WhatsApp</a>` : ''}
                        ${l.videoUrl ? `<br><a href="${l.videoUrl}" target="_blank" class="video-link">▶️ Watch Video</a>` : ''}
                        ${adminHtml}
                    </div>
                `;
            }).join('');
        }

        // ═══════════════════════════════════════════
        //  TOGGLE DESCRIPTION EXPAND
        // ═══════════════════════════════════════════
        function toggleDescription(id) {
            expandedDescriptions[id] = !expandedDescriptions[id];
            renderListings();
        }

        // ═══════════════════════════════════════════
        //  TOGGLE RENTED
        // ═══════════════════════════════════════════
        async function toggleRented(id) {
            if (!isAdmin) {
                alert('Please login as admin first (tap logo 10 times)');
                return;
            }
            const listing = listings.find(l => l._id === id);
            if (!listing) return;
            const newStatus = listing.isAvailable === false ? true : false;
            const statusText = newStatus ? 'available' : 'rented';
            if (!confirm(`Mark this property as ${statusText}?`)) return;

            try {
                const res = await fetch(`${API}/listings/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isAvailable: newStatus })
                });
                const result = await res.json();
                if (result.success) {
                    alert(`✅ Property marked as ${statusText}!`);
                    fetchListings();
                } else {
                    alert('❌ Error updating status');
                }
            } catch (e) {
                alert('❌ Error: ' + e.message);
            }
        }

        // ═══════════════════════════════════════════
        //  SEARCH
        // ═══════════════════════════════════════════
        function searchListings() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                renderListings(listings);
                return;
            }
            const filtered = listings.filter(l =>
                (l.title || '').toLowerCase().includes(query.toLowerCase()) ||
                (l.location || '').toLowerCase().includes(query.toLowerCase()) ||
                (l.description || '').toLowerCase().includes(query.toLowerCase())
            );
            renderListings(filtered);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            renderListings(listings);
        }

        // ═══════════════════════════════════════════
        //  CRUD
        // ═══════════════════════════════════════════
        function updateBadges() {
            const checked = document.querySelectorAll('#badgeV, #badgeA, #badgeO');
            const selected = [];
            checked.forEach(cb => {
                if (cb.checked) selected.push(cb.value);
            });
            document.getElementById('fBadges').value = selected.join(',');
        }

        function getBadges() {
            const val = document.getElementById('fBadges').value;
            return val ? val.split(',') : [];
        }

        function loadBadges(badges) {
            const list = badges || [];
            document.querySelectorAll('#badgeV, #badgeA, #badgeO').forEach(cb => {
                cb.checked = list.includes(cb.value);
            });
            document.getElementById('fBadges').value = list.join(',');
        }

        async function saveListing() {
            const data = {
                title: document.getElementById('fTitle').value.trim(),
                description: document.getElementById('fDesc').value.trim(),
                location: document.getElementById('fLocation').value.trim(),
                price: parseFloat(document.getElementById('fPrice').value) || 0,
                houseType: document.getElementById('fType').value.trim(),
                whatsappNumber: document.getElementById('fWhatsapp').value.trim(),
                videoUrl: document.getElementById('fVideo').value.trim(),
                badges: getBadges()
            };

            if (!data.title || !data.description || !data.location || !data.price || !data.whatsappNumber) {
                alert('Please fill in all required fields (*)');
                return;
            }

            const id = document.getElementById('fId').value;
            const url = id ? `${API}/listings/${id}` : `${API}/listings`;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    alert(id ? '✅ Listing updated!' : '✅ Listing added!');
                    closeModal();
                    fetchListings();
                } else {
                    alert('❌ Error: ' + (result.message || 'Unknown error'));
                }
            } catch (e) {
                alert('❌ Error: ' + e.message);
            }
        }

        async function deleteListing(id) {
            if (!confirm('Are you sure you want to delete this listing?')) return;
            try {
                const res = await fetch(`${API}/listings/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    alert('✅ Listing deleted');
                    fetchListings();
                } else {
                    alert('❌ Error deleting');
                }
            } catch (e) {
                alert('❌ Error: ' + e.message);
            }
        }

        async function editListing(id) {
            const listing = listings.find(l => l._id === id);
            if (!listing) return;
            document.getElementById('modalTitle').textContent = 'Edit Listing';
            document.getElementById('fId').value = id;
            document.getElementById('fTitle').value = listing.title || '';
            document.getElementById('fDesc').value = listing.description || '';
            document.getElementById('fLocation').value = listing.location || '';
            document.getElementById('fPrice').value = listing.price || '';
            document.getElementById('fType').value = listing.houseType || '';
            document.getElementById('fWhatsapp').value = listing.whatsappNumber || '';
            document.getElementById('fVideo').value = listing.videoUrl || '';
            loadBadges(listing.badges || []);
            document.getElementById('listingModal').classList.add('show');
        }

        function openAddModal() {
            if (!isAdmin) {
                alert('Please login as admin first (tap logo 10 times)');
                return;
            }
            document.getElementById('modalTitle').textContent = 'Add New Listing';
            document.getElementById('fId').value = '';
            document.getElementById('fTitle').value = '';
            document.getElementById('fDesc').value = '';
            document.getElementById('fLocation').value = '';
            document.getElementById('fPrice').value = '';
            document.getElementById('fType').value = '';
            document.getElementById('fWhatsapp').value = '';
            document.getElementById('fVideo').value = '';
            loadBadges([]);
            document.getElementById('listingModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('listingModal').classList.remove('show');
        }

        // Close modal on outside click
        document.getElementById('listingModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
